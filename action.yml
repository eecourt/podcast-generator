name: "Podcast Generator"
author: "Erin Courtney"
description: "Generates a feed for a podcast from a YAML file"
runs:
  using: "docker"
  image: "s"
branding: 
  icon: "git-branch"
  color: "red"
intpus:
  email: 
    description: The commiter's email address
    required: true
    default: ${{ github.actor }}
  name:
    description: The commiter's name
    required: true
    default: ${{ github.actor }}